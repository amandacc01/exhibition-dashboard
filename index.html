
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年度參展規劃與執行進度總覽</title>

<style>
body {
  margin:0;
  font-family: "Segoe UI","Noto Sans TC",sans-serif;
  background:#f4f7fb;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:20px;
  border-radius:16px;
  margin:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.title {
  font-size:24px;
  font-weight:800;
}

.btn {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  margin:0 20px 20px 20px;
}

.sidebar {
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.sidebar h3 {
  margin-top:0;
}

.expo {
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.expo:hover {
  background:#eef4ff;
}

.card {
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  margin-bottom:15px;
}

.kpi {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.kpi-box {
  padding:10px;
  border-radius:10px;
  background:#f7faff;
}

.kpi-value {
  font-size:24px;
  font-weight:800;
  margin-top:5px;
}

.gantt button {
  margin:5px;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">年度參展規劃與執行進度總覽</div>
  <button class="btn">新增參展</button>
</div>

<div class="layout">

<!-- 左側 -->
<div class="sidebar">
  <h3>展覽列表</h3>

  <div class="expo" onclick="selectExpo('高雄智慧城市展')">
    高雄智慧城市展
  </div>

  <div class="expo" onclick="selectExpo('工具機展')">
    工具機展
  </div>

</div>

<!-- 右側 -->
<div>

<!-- KPI -->
<div class="card">
  <div class="kpi">
    <div class="kpi-box">
      展覽數
      <div class="kpi-value">3</div>
    </div>
    <div class="kpi-box">
      展項
      <div class="kpi-value">15</div>
    </div>
    <div class="kpi-box">
      進度
      <div class="kpi-value">10%</div>
    </div>
    <div class="kpi-box">
      推進
      <div class="kpi-value">20%</div>
    </div>
  </div>
</div>

<!-- 甘特 -->
<div class="card gantt">
  <h3>甘特圖（點擊操作）</h3>

  <button onclick="openModal('核定')">核定</button>
  <button onclick="openModal('演練')">演練</button>
  <button onclick="openModal('追蹤')">追蹤</button>

</div>

<div class="card" id="detail">
👉 尚未選擇展覽
</div>

</div>

</div>
