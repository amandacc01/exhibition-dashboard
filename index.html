
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年度參展規劃與執行進度總覽</title>

<style>
body {
  margin:0;
  font-family:"Segoe UI","Noto Sans TC",sans-serif;
  background:#f4f7fb;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:20px;
  border-radius:16px;
  margin:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.title {
  font-size:24px;
  font-weight:800;
}

.btn {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* Layout */
.layout {
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  margin:0 20px 20px 20px;
}

/* Sidebar */
.sidebar {
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.sidebar h3 {
  margin-top:0;
}

.expo {
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.expo:hover {
  background:#eef4ff;
}

/* Card */
.card {
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  margin-bottom:15px;
}

/* KPI */
.kpi {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.kpi-box {
  padding:10px;
  border-radius:10px;
  background:#f7faff;
}

.kpi-value {
  font-size:24px;
  font-weight:800;
  margin-top:5px;
}

/* 甘特 */
.gantt button {
  margin:5px;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">年度參展規劃與執行進度總覽</div>
  <button class="btn">新增參展</button>
</div>

<div class="layout">

<!-- 左側 -->
<div class="sidebar">
  <h3>展覽列表</h3>

  <div class="expo" onclick="selectExpo('高雄智慧城市展')">
    高雄智慧城市展
  </div>

  <div class="expo" onclick="selectExpo('工具機展')">
    工具機展
  </div>
</div>

<!-- 右側 -->
<div>

<!-- KPI -->
<div class="card">
  <div class="kpi">
    <div class="kpi-box">
      展覽數
      <div class="kpi-value">3</div>
    </div>
    <div class="kpi-box">
      展項
      <div class="kpi-value">15</div>
    </div>
    <div class="kpi-box">
      進度
      <div class="kpi-value">10%</div>
    </div>
    <div class="kpi-box">
      推進
      <div class="kpi-value">20%</div>
    </div>
  </div>
</div>

<!-- 甘特 -->
<div class="card gantt">
  <h3>甘特圖（點擊操作）</h3>

  <button onclick="openModal('核定')">核定</button>
  <button onclick="openModal('演練')">演練</button>
  <button onclick="openModal('追蹤')">追蹤</button>
</div>

<!-- 詳細 -->
<div class="card" id="detail">
👉 尚未選擇展覽
</div>

</div>

</div>


<!-- Modal 視窗 -->
<div id="modal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:12px;
    width:350px;
    margin:auto;
  ">

    <h3 id="modalTitle"></h3>

    <input id="input1" placeholder="內容" style="width:100%;margin-bottom:10px">
    <input id="input2" placeholder="日期" style="width:100%;margin-bottom:10px">

    <button onclick="save()">儲存</button>
    <button onclick="closeModal()">取消</button>

  </div>
</div>

<script>

let currentExpo = "";
let currentType = "";

// ✅ 點選展覽
function selectExpo(name){
  currentExpo = name;

  const data = localStorage.getItem(name) || "尚未填寫";

  document.getElementById("detail").innerHTML =
  "📌 " + name + "<br><br>" + data;
}

// ✅ 打開視窗
function openModal(type){
  currentType = type;

  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = type;

  // 清空
  document.getElementById("input1").value = "";
  document.getElementById("input2").value = "";
}

// ✅ 關閉
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ✅ 儲存（簡單版）

function save(){

  if(!currentExpo){
    alert("請先選展覽");
    return;
  }

  const v1 = document.getElementById("input1").value;
  const v2 = document.getElementById("input2").value;

  // ✅ 改成「物件儲存」(關鍵)
  let data = JSON.parse(localStorage.getItem(currentExpo) || "{}");

  data[currentType] = v1 + " / " + v2;

  localStorage.setItem(currentExpo, JSON.stringify(data));

  closeModal();

  // ✅ 顯示全部紀錄（不覆蓋）
  let html = "<b>📌 " + currentExpo + "</b><br><br>";

  for(let key in data){
    html += "✅ " + key + "：" + data[key] + "<br>";
  }

  document.getElementById("detail").innerHTML = html;
}


</script>

  
</body>
</html>
